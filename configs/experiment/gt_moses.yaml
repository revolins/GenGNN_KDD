# @package _global_
general:
  name: gt_moses
  gpus: 1
  wandb: online
  remove_h: true
  resume: null
  test_only: null
  check_val_every_n_epochs: 1
  val_check_interval: null
  sample_every_val: 1
  samples_to_generate: 256
  samples_to_save: 20
  chains_to_save: 5
  log_every_steps: 50
  final_model_samples_to_generate: 25000
  final_model_samples_to_save: 4
  final_model_chains_to_save: 4
train:
  optimizer: adamw
  n_epochs: 160
  batch_size: 512
  save_model: true
  lr: 2e-4
  num_workers: 1
  time_distortion: polydec
sample:
  time_distortion: polydec
  omega: 0.5
  eta: 200
model:
  n_layers: 12
  name: defog
  type: gt
  transition: marginal
  model: gt_moses
  hidden_mlp_dims:
    X: 256
    E: 128
    y: 256
  rrwp_steps: 20
  hidden_dims:
    dx: 256
    de: 64
    dy: 128
    n_head: 8
    dim_ffX: 256
    dim_ffE: 128
    dim_ffy: 256
  ablation_study:
    components:
      use_dropout: true
      use_edge_gating: true
      use_feedforward: true
      use_gcn: false
      use_gin: false
      use_node_gating: true
      use_normalization: true
      use_residual: true
      use_rrwp_edge_features: true
      use_rrwp_node_features: true
    enabled: true
  dropout: 0.0
  edge_class_onehot: true
  edge_feat_dim: 14
  edge_source: concat
  edge_weight_mode: linear
  ffn: true
  ffn_hidden: 128
  ffn_norm: batch
  norm: batch
  residual: true
dataset:
  name: moses
  datadir: data/moses/moses_pyg/
  remove_h: null
  filter: false
  compute_fcd: false
  aromatic: false
